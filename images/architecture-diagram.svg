  <circle class="live" cx="1204" cy="220" r="3.2"/>
  <text class="lbl" x="950" y="227">Pass 2 · Opus 4.7</text>
  <text class="sub" x="950" y="245">classify_and_draft → JSON · temp 0.3</text>

  <rect class="b" x="934" y="264" width="282" height="48" rx="2"/>
  <circle class="live" cx="1204" cy="276" r="3.2"/>
  <text class="lbl" x="950" y="283">Telegram bot</text>
  <text class="sub" x="950" y="301">Send · Edit (Mini App) · Skip</text>

