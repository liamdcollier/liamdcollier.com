  <circle class="live" cx="852" cy="282" r="3.2"/>
  <text class="lbl" x="680" y="292">HeyReach</text>
  <text class="sub" x="680" y="310">LinkedIn · 175 connects/wk</text>
</g>

<!-- Channels -> Webhooks (replies inbound) -->
<path class="a" d="M864,208 L898,208 L898,120 L932,120" marker-end="url(#ah)"/>
<path class="a" d="M864,296 L898,296 L898,120 L932,120"/>

<!-- ============================================================
     ORCHESTRATION (x=934, w=282, h=48, gap=8)
     ============================================================ -->
<g>
  <rect class="b" x="934" y="96"  width="282" height="48" rx="2"/>
  <circle class="live" cx="1204" cy="108" r="3.2"/>
  <text class="lbl" x="950" y="115">Webhooks endpoint</text>
  <text class="sub" x="950" y="133">HMAC-verified · idempotent</text>

  <rect class="b" x="934" y="152" width="282" height="48" rx="2"/>
  <text class="lbl" x="950" y="171">Pass 1 · Sonnet 4.6</text>
  <text class="sub" x="950" y="189">Posture pre-classify (~$0.001)</text>

