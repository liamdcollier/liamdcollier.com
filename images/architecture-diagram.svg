  <circle class="live" cx="1204" cy="510" r="3.2"/>
  <text class="lbl" x="860" y="520">Pushover · APScheduler · 9 crons</text>
  <text class="sub" x="860" y="540">Bogota TZ · one-way operator alerts</text>
  <text class="sub" x="860" y="556">starvation · lake_health · ingest summaries</text>
  <text class="sub" x="860" y="567">dispatcher errors · weekly briefing</text>
</g>

