<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Architecture diagram of the Infraxus sales orchestration system. Sources (Sales Nav, Evaboot/Emelia, Dropbox) feed a six-stage 5-minute cron ingestion pipeline (format dispatch, dedup, Apify enrichment, Sonnet 4.6 qualifier, Apollo bulk match, HubSpot write). HubSpot fans out to two channels: Instantly for email and HeyReach for LinkedIn. Replies arrive at webhooks and flow through a two-pass orchestration: Sonnet 4.6 posture pre-classify, then Opus 4.7 classify-and-draft, into the Telegram review bot, then dispatcher, which sends back through the channels. Beneath everything, a reasoning substrate of the Supabase interactions table, a deferred 4-hour Opus reasoning loop, and Pushover alerts.">
<title>Infraxus · Sales orchestration architecture</title>
<style>
  .b{stroke:#1A1A1A;fill:#FBF6EC;stroke-width:1.2}
  .ba{stroke:#1E50FF;fill:#FBF6EC;stroke-width:1.4}
  .a{stroke:#1A1A1A;fill:none;stroke-width:1.2}
  .ad{stroke:#1A1A1A;fill:none;stroke-width:1;stroke-dasharray:4 3}
  .ru{stroke:#E8DEC9;stroke-width:1}
  .ru2{stroke:#D9CDB1;stroke-width:1}
  .lbl{font-family:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px;font-weight:600;fill:#0A0A0A;letter-spacing:-0.005em}
  .sub{font-family:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:11px;font-weight:400;fill:#6B6B6B}
  .col{font-family:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:11px;font-weight:600;fill:#1E50FF;letter-spacing:0.18em}
  .eyb{font-family:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:11px;font-weight:600;fill:#6B6B6B;letter-spacing:0.18em}
  .num{font-family:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:10px;font-weight:600;fill:#6B6B6B}
  .live{fill:#10B981}
  .prod{fill:#F59E0B}
</style>
<defs>
  <marker id="ah" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3.5 L0,7 z" fill="#1A1A1A"/></marker>
  <marker id="ah2" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3.5 L0,7 z" fill="#1E50FF"/></marker>
</defs>

<!-- TITLE -->
<text class="eyb" x="64" y="36">INFRAXUS · SALES ORCHESTRATION ARCHITECTURE</text>
<line class="ru" x1="64" y1="50" x2="1216" y2="50"/>

<!-- COLUMN HEADERS -->
<text class="col" x="64"  y="78">SOURCES</text>
<text class="col" x="354" y="78">INGESTION · 5-MIN CRON</text>
<text class="col" x="664" y="78">CHANNELS</text>
<text class="col" x="934" y="78">REPLY ORCHESTRATION</text>

<!-- ============================================================
     SOURCES (x=64, w=220)
     ============================================================ -->
<g>
  <rect class="b" x="64"  y="96"  width="220" height="56" rx="2"/>
  <text class="lbl" x="80"  y="120">Sales Navigator</text>
  <text class="sub" x="80"  y="138">Operator-built saved searches</text>

  <rect class="b" x="64"  y="166" width="220" height="56" rx="2"/>
  <text class="lbl" x="80"  y="190">Evaboot · Emelia</text>
  <text class="sub" x="80"  y="208">CSV / XLSX export</text>

  <rect class="b" x="64"  y="236" width="220" height="56" rx="2"/>
  <text class="lbl" x="80"  y="260">Dropbox /CSV-inbox</text>
  <text class="sub" x="80"  y="278">cohort__channel__campaign</text>
</g>

<!-- vertical arrows within sources -->
