<line class="a" x1="174" y1="222" x2="174" y2="234" marker-end="url(#ah)"/>

<!-- Sources -> Ingestion (Dropbox right -> Format dispatch left) -->
<path class="a" d="M284,264 L319,264 L319,120 L352,120" marker-end="url(#ah)"/>

<!-- ============================================================
     INGESTION (x=354, w=240, h=48, gap=8)
     ============================================================ -->
<g>
  <rect class="b" x="354" y="96"  width="240" height="48" rx="2"/>
  <text class="num" x="368" y="115">01</text>
  <text class="lbl" x="394" y="115">Format dispatch</text>
  <text class="sub" x="368" y="133">Magic byte: PK → XLSX, else CSV</text>

  <rect class="b" x="354" y="152" width="240" height="48" rx="2"/>
  <text class="num" x="368" y="171">02</text>
  <text class="lbl" x="394" y="171">Dedup</text>
  <text class="sub" x="368" y="189">Supabase 30-day · HubSpot search</text>

  <rect class="b" x="354" y="208" width="240" height="48" rx="2"/>
  <text class="num" x="368" y="227">03</text>
  <text class="lbl" x="394" y="227">Apify enrichment</text>
  <text class="sub" x="368" y="245">LinkedIn profile + Google SERP · fail-CLOSED</text>

  <rect class="b" x="354" y="264" width="240" height="48" rx="2"/>
  <circle class="live" cx="582" cy="276" r="3.2"/>
  <text class="num" x="368" y="283">04</text>
  <text class="lbl" x="394" y="283">Sonnet 4.6 qualifier</text>
  <text class="sub" x="368" y="301">OpenRouter · 35s timeout</text>

  <rect class="b" x="354" y="320" width="240" height="48" rx="2"/>
  <circle class="live" cx="582" cy="332" r="3.2"/>
  <text class="num" x="368" y="339">05</text>
  <text class="lbl" x="394" y="339">Apollo people/bulk_match</text>
  <text class="sub" x="368" y="357">instantly cohorts only · fail-OPEN</text>

  <rect class="b" x="354" y="376" width="240" height="48" rx="2"/>
  <circle class="live" cx="582" cy="388" r="3.2"/>
  <text class="num" x="368" y="395">06</text>
  <text class="lbl" x="394" y="395">HubSpot write</text>
  <text class="sub" x="368" y="413">Bucketed enums · 10 custom props</text>
</g>

<!-- vertical arrows within ingestion -->
<line class="a" x1="474" y1="144" x2="474" y2="150" marker-end="url(#ah)"/>
<line class="a" x1="474" y1="200" x2="474" y2="206" marker-end="url(#ah)"/>
<line class="a" x1="474" y1="256" x2="474" y2="262" marker-end="url(#ah)"/>
