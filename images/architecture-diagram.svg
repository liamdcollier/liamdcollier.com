<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-label="A simplified diagram of the Infraxus sales orchestration architecture. Three source streams feed into a Sonnet qualifier, HubSpot orchestrates outreach across twelve inboxes and LinkedIn, an Opus reasoning layer sits above the orchestration, and a Sales Command Center surfaces the consolidated state.">
  <defs>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1F4E5F"/>
    </marker>
  </defs>
  <g fill="none" stroke="#1F4E5F" stroke-width="1" font-family="Inter, system-ui, sans-serif">
    <rect x="40" y="40" width="160" height="56" rx="2"/>
    <rect x="280" y="40" width="160" height="56" rx="2"/>
    <rect x="520" y="40" width="160" height="56" rx="2"/>
    <path d="M120 96 L120 140 L360 140 L360 168" marker-end="url(#arr)"/>
    <path d="M360 96 L360 168" marker-end="url(#arr)"/>
    <path d="M600 96 L600 140 L360 140"/>
    <rect x="240" y="170" width="240" height="56" rx="2"/>
    <path d="M360 226 L360 264" marker-end="url(#arr)"/>
    <rect x="200" y="266" width="320" height="56" rx="2"/>
    <rect x="540" y="170" width="140" height="152" rx="2" stroke-dasharray="3 3"/>
    <path d="M480 198 L540 198" marker-end="url(#arr)"/>
    <path d="M360 322 L360 360" marker-end="url(#arr)"/>
    <path d="M610 322 L610 360" marker-end="url(#arr)"/>
    <rect x="200" y="362" width="420" height="48" rx="2"/>
  </g>
  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#1A1A1A">
    <text x="120" y="64" text-anchor="middle">Apollo</text>
    <text x="120" y="82" text-anchor="middle" fill="#6B6B6B" font-size="11">enrichment source</text>
    <text x="360" y="64" text-anchor="middle">Seek pipeline</text>
    <text x="360" y="82" text-anchor="middle" fill="#6B6B6B" font-size="11">AU hiring signals</text>
    <text x="600" y="64" text-anchor="middle">LinkedIn</text>
    <text x="600" y="82" text-anchor="middle" fill="#6B6B6B" font-size="11">outbound channel</text>
    <text x="360" y="194" text-anchor="middle">Sonnet qualifier</text>
    <text x="360" y="212" text-anchor="middle" fill="#6B6B6B" font-size="11">classification, scoring, rejection</text>
    <text x="360" y="290" text-anchor="middle">HubSpot orchestration</text>
    <text x="360" y="308" text-anchor="middle" fill="#6B6B6B" font-size="11">twelve-inbox cadence, LinkedIn outreach</text>
    <text x="610" y="200" text-anchor="middle">Opus</text>
    <text x="610" y="218" text-anchor="middle">reasoning</text>
    <text x="610" y="240" text-anchor="middle" fill="#6B6B6B" font-size="11">4hr cadence</text>
    <text x="610" y="258" text-anchor="middle" fill="#6B6B6B" font-size="11">patterns, risks</text>
    <text x="610" y="280" text-anchor="middle" fill="#6B6B6B" font-size="11">Pushover</text>
    <text x="610" y="298" text-anchor="middle" fill="#6B6B6B" font-size="11">morning brief</text>
    <text x="410" y="392" text-anchor="middle">Sales Command Center</text>
  </g>
</svg>
